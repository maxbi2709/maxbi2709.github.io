<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harry Rauramo</title>
  <meta name="description" content="Full Stack Developer, Blockchain Developer, Casino Game Developer" />

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;700&display=swap" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/styles.min.css" />
</head>
<body>
  <!-- Video background -->
  <div class="video-background">
    <video autoplay muted loop>
      <source src="/images/background.webm" type="video/webm" />
    </video>
  </div>

  <!-- Terminal card -->
  <div class="card terminal">
    <div class="card-header">Terminal</div>
    <div class="card-body"></div>
  </div>

  <div class="cards-container"></div>

  <!-- JS Libraries -->
  <script src="/js/ua-parser.min.js"></script>
  <script src="/js/terminal.min.js"></script>

  <!-- Terminal Script -->
  <script>
    var parser = new UAParser();
    var ua = parser.getResult();

    var commands = [
      { text: "Detecting system...", typing: true },
      { text: "Browser: " + ua.browser.name + " " + ua.browser.version, typing: true },
      { text: "OS: " + ua.os.name + " " + ua.os.version, typing: true },
      { text: "Device: " + (ua.device.type || "Desktop"), typing: true },
      { text: "Done!", typing: true }
    ];

    new Terminal({
      container: document.querySelector(".card-body"),
      commands: commands,
      typingSpeed: 80,
      pause: 600,
      cursor: true
    });
  </script>
</body>
</html>
